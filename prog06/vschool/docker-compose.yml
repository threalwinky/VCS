services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vschool_app
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./web:/var/www/html
    depends_on:
      - db
    networks:
      - default

  nginx:
    image: nginx:1.27-alpine
    container_name: vschool_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./web:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - default

  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: vschool_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: school
      MYSQL_USER: winky
      MYSQL_PASSWORD: testpassword
      MYSQL_ROOT_PASSWORD: root
    networks:
      - default

volumes:
  db_data:

networks:
  default:
    driver: bridge
